name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Deno ${{ matrix.deno-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        deno-version: ["v2.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type-check
        run: deno check mod.ts

      - name: Test
        run: deno task test
